strategy:
  scan_interval_seconds: 600
  max_tracked_wallets: 10

filters:
  min_position_size_usd: 10
  min_conviction_score: 0.3
  max_price_drift: 0.03
  min_time_to_expiry_minutes: 30
  allow_conflict: false
  skip_existing_position: true
  min_wallet_win_rate_60d: 0.55

position:
  copy_ratio: 0.1
  max_single_position_usd: 3
  max_total_exposure_usd: 8
  min_order_shares: 5
  reserve_balance_usd: 1

exit:
  trailing_activation_profit_percent: 0.3
  trailing_drawdown_percent: 0.1
  stop_loss_percent: -0.2
  max_hold_hours: 48
  follow_smart_wallet_exit: true
  alert_move_percent: 0.15

risk:
  max_order_retries: 3
  slippage_protection_percent: 0.05
  pending_timeout_minutes: 30

notification:
  feishu_webhook: ""

wallets:
  - "0x123..."
  - "0xabc..."
